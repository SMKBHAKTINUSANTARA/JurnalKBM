    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-wrapper {
            margin-bottom: 10px;
        }

        .logo {
            max-width: 90px;
            height: auto;
            border-radius: 50%;
        }

        .header h1 {
            font-size: 24px;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .text-two-columns .form-group {
            flex: 1;
            min-width: 0;
        }

        .jam-select-container {
            display: flex;
            gap: 10px;
        }

        .sub-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .sub-label {
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 2px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #34495e;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            color: #333;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        input[readonly] {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
        }

        input[type="file"] {
            border: 1px dashed #3498db;
            padding: 12px;
            border-radius: 6px;
            background-color: #f8fafc;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: White;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            body {
                padding: 10px 5px;
            }
            .container {
                padding: 15px;
            }
        }
    </style>
</head>

    <script>
        function muatTanggalOtomatis() {
            const hariIni = new Date();
            const opsiFormat = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const tanggalRapi = hariIni.toLocaleDateString('id-ID', opsiFormat);
            
            const kotakTanggal = document.getElementById('tanggal-otomatis');
            if (kotakTanggal) {
                kotakTanggal.value = tanggalRapi;
            }
        }

        window.addEventListener('DOMContentLoaded', muatTanggalOtomatis);

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyQ4DScOV3FrleOtlMyqEL-UGNjW82-ZTtm5OIy5hcz0ae2i4LokHH_nd-8QU6Ky1DAIA/exec'; // <-- GANTI DENGAN URL WEB APP BARU LANGKAH 1
        const form = document.getElementById('jurnalForm');
        const btnKirim = document.getElementById('btnKirim');
        const fotoInput = document.getElementById('fotoInput');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            btnKirim.disabled = true;
            btnKirim.innerText = "Memproses & Mengirim data...";

            // Membaca nilai elemen form secara manual untuk dibuat menjadi paket JSON padat
            const dataObjek = {
                jam_dari: form.elements['jam_dari'].value,
                jam_sampai: form.elements['jam_sampai'].value,
                tanggal: form.elements['tanggal'].value,
                kelas: form.elements['kelas'].value,
                guru: form.elements['guru'].value,
                mata_pelajaran: form.elements['mata_pelajaran'].value,
                materi: form.elements['materi'].value,
                siswa_absen: form.elements['siswa_absen'].value,
                foto_base64: ""
            };

            const file = fotoInput.files[0];

            const kirimPaketJSON = (payload) => {
                fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(payload) // Mengirim sebagai string JSON murni agar kebal error payload
                })
                .then(response => {
                    alert('Jurnal dan Foto berhasil dikirim secara real-time!');
                    form.reset();
                    muatTanggalOtomatis();
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('Gagal mengirim data. Silakan periksa jaringan Anda.');
                })
                .finally(() => {
                    btnKirim.disabled = false;
                    btnKirim.innerText = "Kirim Jurnal";
                });
            };

            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Kompresi resolusi maksimal ke 400px agar efisien di sel tabel
                        const MAX_WIDTH = 400;
                        const MAX_HEIGHT = 400;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        // Kompresi kualitas gambar 50%
                        dataObjek.foto_base64 = canvas.toDataURL('image/jpeg', 0.5);
                        kirimPaketJSON(dataObjek);
                    };
                };
            } else {
                kirimPaketJSON(dataObjek);
            }
        });
    </script>
